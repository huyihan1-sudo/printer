<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Polaroid Typewriter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { background-color: #09090b; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .typewriter-font { font-family: 'Courier Prime', monospace; }
        ::-webkit-scrollbar { display: none; }
        .polaroid-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3); }
        @keyframes slideDown { 0% { transform: translate(-50%, -100%); opacity: 0; } 100% { transform: translate(-50%, 20px); opacity: 1; } }
        .polaroid-emerge { animation: slideDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        .polaroid-card { transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), z-index 0s; }
        .polaroid-card:hover { transform: scale(1.05) rotate(0deg) !important; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const App = () => {
            const [text, setText] = useState("");
            const [prints, setPrints] = useState([]);
            const [isPrinting, setIsPrinting] = useState(false);
            const inputRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            const handlePrint = () => {
                if (!text.trim() || isPrinting) return;
                setIsPrinting(true);
                setTimeout(() => {
                    const newPrint = { id: Date.now(), content: text, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                    setPrints([newPrint, ...prints]);
                    setText("");
                    setIsPrinting(false);
                }, 1000);
            };
            return (
                <div className="min-h-screen flex flex-col items-center justify-start py-12 px-4">
                    <div className="mb-12 text-center">
                        <h1 className="text-white text-4xl font-black tracking-tighter uppercase italic">Retro <span className="text-zinc-500">Scribe</span></h1>
                        <p className="text-zinc-600 text-xs mt-2 tracking-[0.3em] uppercase">Analog Soul in Digital Form</p>
                    </div>
                    <div className="relative w-full max-w-xl">
                        <div className="bg-zinc-900 border-x border-t border-zinc-800 rounded-t-3xl p-8 shadow-2xl relative z-20">
                            <div className="flex items-center justify-between mb-6">
                                <div className="flex gap-2">
                                    <div className="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                                    <div className="w-3 h-3 rounded-full bg-zinc-700"></div>
                                </div>
                                <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Model 01-NomadsFi</div>
                            </div>
                            <textarea ref={inputRef} value={text} onChange={(e) => setText(e.target.value)} placeholder="在这里输入你的思考..." className="w-full h-40 bg-transparent text-zinc-100 typewriter-font text-xl outline-none resize-none placeholder:text-zinc-800" maxLength={140} />
                            <div className="flex justify-between items-end mt-4">
                                <span className="text-[10px] text-zinc-700 font-mono tracking-tighter">CHARS: {text.length}/140</span>
                                <button onClick={handlePrint} disabled={!text.trim() || isPrinting} className={`px-8 py-3 rounded-full font-black text-sm uppercase tracking-tighter transition-all flex items-center gap-2 ${text.trim() && !isPrinting ? 'bg-white text-black hover:scale-105 active:scale-95' : 'bg-zinc-800 text-zinc-600 cursor-not-allowed'}`}>
                                    {isPrinting ? '正在出片...' : '打印拍立得'}
                                    <i data-lucide="camera" className="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div className="h-4 bg-black w-full shadow-inner relative z-30"><div className="absolute inset-x-0 top-0 h-1 bg-white/5"></div></div>
                        {isPrinting && (<div className="absolute left-1/2 -translate-x-1/2 z-10 polaroid-emerge"><div className="w-64 aspect-[4/5] bg-white p-4 pb-12 polaroid-shadow border border-zinc-200"><div className="w-full h-full bg-zinc-100 flex items-center justify-center overflow-hidden"><p className="typewriter-font text-zinc-400 text-xs px-4 text-center animate-pulse">正在显影...</p></div></div></div>)}
                    </div>
                    <div className="mt-40 w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 pb-24">
                        {prints.map((item, index) => (
                            <div key={item.id} className="relative animate-fade-in z-0">
                                <div className="polaroid-card bg-white p-4 pb-12 polaroid-shadow border border-zinc-200 relative z-10" style={{ transform: `rotate(${index % 2 === 0 ? -2 : 2}deg)` }}>
                                    <div className="w-full aspect-square bg-zinc-50 border border-zinc-100 p-6 flex items-center justify-center text-center"><p className="typewriter-font text-zinc-800 text-lg leading-relaxed break-words">{item.content}</p></div>
                                    <div className="mt-6 flex justify-between items-center px-1">
                                        <div className="flex flex-col"><span className="text-[10px] font-black uppercase text-zinc-400 leading-none">{item.date}</span><span className="text-[10px] font-medium text-zinc-300">{item.time}</span></div>
                                        <div className="text-[12px] italic text-zinc-300 typewriter-font">#NomadsFi</div>
                                    </div>
                                </div>
                                <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-16 h-6 bg-zinc-200/50 backdrop-blur-sm border border-white/20 rotate-1 shadow-sm z-20"></div>
                            </div>
                        ))}
                    </div>
                    {prints.length === 0 && !isPrinting && (<div className="mt-32 text-zinc-800 text-center"><i data-lucide="layers" className="w-12 h-12 mx-auto mb-4 opacity-20"></i><p className="text-sm font-bold uppercase tracking-widest opacity-30">暂无打印记录</p></div>)}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
